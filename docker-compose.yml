services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eliza_sst
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - custom_net

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/eliza_sst?schema=public"
      NEXTAUTH_SECRET: "megga-work-sst-secret-key-2024"
      NEXTAUTH_URL: "http://localhost:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      custom_net:
        ipv4_address: 172.28.0.100

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:172.28.0.100"
    depends_on:
      app:
        condition: service_started
    networks:
      - custom_net

networks:
  custom_net:
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    name: eliza-v2_postgres_data
  uploads_data:
    name: eliza-v2_uploads_data
